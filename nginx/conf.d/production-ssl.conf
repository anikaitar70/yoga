# Production HTTPS config — sole active file in conf.d/ (see nginx/inactive/ for bootstrap).
#
# Canonical site: https://nirvanayoga.org
# yoga.anikait.page and www.nirvanayoga.org redirect to the apex domain.
# Cert path: expanded cert lives under yoga.anikait.page (covers all SANs).
#
# HTTP/2 is intentionally OFF on the primary host — on a small VPS it often causes
# ERR_HTTP2_PING_FAILED / ERR_HTTP2_PROTOCOL_ERROR when proxying many Next.js chunks.

# HTTP — ACME challenge + redirect to canonical HTTPS
server {
  listen 80;
  server_name yoga.anikait.page nirvanayoga.org www.nirvanayoga.org;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
    allow all;
  }

  location / {
    return 301 https://nirvanayoga.org$request_uri;
  }
}

# HTTPS — legacy staging host → canonical domain
server {
  listen 443 ssl;
  server_name yoga.anikait.page;

  ssl_certificate /etc/letsencrypt/live/yoga.anikait.page/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/yoga.anikait.page/privkey.pem;
  include /etc/nginx/snippets/ssl-params.conf;

  return 301 https://nirvanayoga.org$request_uri;
}

# HTTPS — www → apex
server {
  listen 443 ssl;
  server_name www.nirvanayoga.org;

  ssl_certificate /etc/letsencrypt/live/yoga.anikait.page/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/yoga.anikait.page/privkey.pem;
  include /etc/nginx/snippets/ssl-params.conf;

  return 301 https://nirvanayoga.org$request_uri;
}

# HTTPS — primary site (nirvanayoga.org)
server {
  listen 443 ssl;
  server_name nirvanayoga.org;

  ssl_certificate /etc/letsencrypt/live/yoga.anikait.page/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/yoga.anikait.page/privkey.pem;
  include /etc/nginx/snippets/ssl-params.conf;
  include /etc/nginx/snippets/security-headers.conf;

  location /uploads/ {
    alias /var/www/uploads/;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    access_log off;
  }

  # Testimonial OCR (Tesseract) — first run can take 30–60s on a small VPS.
  location /api/cms/testimonials/ocr {
    client_max_body_size 16M;
    include /etc/nginx/snippets/docker-proxy.conf;
    include /etc/nginx/snippets/nextjs-app-proxy.conf;
    set $app_upstream http://app:3000;
    proxy_pass $app_upstream;
  }

  # Gallery uploads run image processing — allow longer upstream time and full body.
  location /api/upload {
    client_max_body_size 16M;
    include /etc/nginx/snippets/docker-proxy.conf;
    include /etc/nginx/snippets/nextjs-app-proxy.conf;
    set $app_upstream http://app:3000;
    proxy_pass $app_upstream;
  }

  location /_next/static/ {
    include /etc/nginx/snippets/docker-proxy.conf;
    include /etc/nginx/snippets/nextjs-app-proxy.conf;
    set $app_upstream http://app:3000;
    proxy_pass $app_upstream;
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location / {
    include /etc/nginx/snippets/docker-proxy.conf;
    include /etc/nginx/snippets/nextjs-app-proxy.conf;
    set $app_upstream http://app:3000;
    proxy_pass $app_upstream;
  }
}
